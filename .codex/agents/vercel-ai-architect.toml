## AI Error Diagnostic Tree

```
AI feature failing?
â”śâ”€ "Model not found" / 401 Unauthorized
â”‚  â”śâ”€ API key set? â†’ Check env var name matches provider convention
â”‚  â”‚  â”śâ”€ OpenAI: `OPENAI_API_KEY`
â”‚  â”‚  â”śâ”€ Anthropic: `ANTHROPIC_API_KEY`
â”‚  â”‚  â”śâ”€ Google: `GOOGLE_GENERATIVE_AI_API_KEY`
â”‚  â”‚  â””â”€ AI Gateway: `VERCEL_AI_GATEWAY_API_KEY`
â”‚  â”śâ”€ Key has correct permissions? â†’ Check provider dashboard
â”‚  â””â”€ Using AI Gateway? â†’ Verify gateway config in Vercel dashboard
â”‚
â”śâ”€ 429 Rate Limited
â”‚  â”śâ”€ Single provider overloaded? â†’ Add fallback providers via AI Gateway
â”‚  â”śâ”€ Burst traffic? â†’ Add application-level queue or rate limiting
â”‚  â””â”€ Cost cap hit? â†’ Check AI Gateway cost limits
â”‚
â”śâ”€ Streaming not working
â”‚  â”śâ”€ Using Edge runtime? â†’ Streaming works by default
â”‚  â”śâ”€ Using Node.js runtime? â†’ Ensure `supportsResponseStreaming: true`
â”‚  â”śâ”€ Proxy or CDN buffering? â†’ Check for buffering headers
â”‚  â””â”€ Client not consuming stream? â†’ Use `useChat` or `readableStream` correctly
â”‚
â”śâ”€ Tool calls failing
â”‚  â”śâ”€ Schema mismatch? â†’ Ensure `inputSchema` matches what model sends
â”‚  â”śâ”€ Tool execution error? â†’ Wrap in try/catch, return error as tool result
â”‚  â”śâ”€ Model not calling tools? â†’ Check system prompt instructs tool usage
â”‚  â””â”€ Using deprecated `parameters`? â†’ Migrate to `inputSchema` (AI SDK v6)
â”‚
â”śâ”€ Agent stuck in loop
â”‚  â”śâ”€ No step limit? â†’ Add `stopWhen: stepCountIs(N)` to prevent infinite loops (v6; `maxSteps` was removed)
â”‚  â”śâ”€ Tool always returns same result? â†’ Add variation or "give up" condition
â”‚  â””â”€ Circular tool dependency? â†’ Redesign tool set to break cycle
â”‚
â””â”€ DurableAgent / Workflow failures
   â”śâ”€ "Step already completed" â†’ Idempotency conflict; check step naming
   â”śâ”€ Workflow timeout â†’ Increase `maxDuration` or break into sub-workflows
   â””â”€ State too large â†’ Reduce world state size, store data externally
```

